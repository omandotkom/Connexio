name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            args: --win
            artifact-pattern: "release/*.exe"
            artifact-name: connexio-windows
          - os: macos-latest
            platform: mac
            args: --mac
            artifact-pattern: "release/*.dmg"
            artifact-name: connexio-macos
          - os: ubuntu-latest
            platform: linux
            args: --linux
            artifact-pattern: "release/*.AppImage"
            artifact-name: connexio-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.blockmap
            release/*.yml
          retention-days: 30

  publish-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating changelog from $PREV_TAG to $CURRENT_TAG"

          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            if [[ "$line" == feat:* ]] || [[ "$line" == feat\(*\):* ]]; then
              FEATURES="$FEATURES\n- ${line#feat: }"
            elif [[ "$line" == fix:* ]] || [[ "$line" == fix\(*\):* ]]; then
              FIXES="$FIXES\n- ${line#fix: }"
            elif [[ "$line" == ci:* ]] || [[ "$line" == chore:* ]] || [[ "$line" == release:* ]]; then
              :
            else
              OTHER="$OTHER\n- $line"
            fi
          done <<< "$(git log $PREV_TAG..$CURRENT_TAG --pretty=format:'%s' --no-merges)"

          NOTES=""
          if [ -n "$FEATURES" ]; then
            NOTES="$NOTES## ✨ New Features\n$FEATURES\n\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="$NOTES## 🐛 Bug Fixes\n$FIXES\n\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="$NOTES## 📦 Other Changes\n$OTHER\n\n"
          fi

          VERSION=${{ steps.version.outputs.VERSION }}
          NOTES="$NOTES---\n\n"
          NOTES="$NOTES**Full Changelog:** [\`$PREV_TAG...$CURRENT_TAG\`](https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG)\n\n"
          NOTES="$NOTES### 📥 Downloads\n"
          NOTES="$NOTES| Platform | File |\n"
          NOTES="$NOTES|----------|------|\n"
          NOTES="$NOTES| Windows | \`Connexio Setup ${VERSION}.exe\` |\n"
          NOTES="$NOTES| macOS | \`Connexio-${VERSION}.dmg\` |\n"
          NOTES="$NOTES| Linux | \`Connexio-${VERSION}.AppImage\` |"

          echo -e "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Wait for all platform builds to upload assets
          echo "Waiting for builds to finish uploading..."
          sleep 60

          # Publish release with changelog
          gh release edit "$TAG" \
            --repo ${{ github.repository }} \
            --title "Connexio $TAG" \
            --notes-file release_notes.md \
            --draft=false \
            --latest \
            2>/dev/null || echo "Release not found yet, skipping edit"
