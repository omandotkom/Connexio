name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  determine-release:
    runs-on: ubuntu-latest
    outputs:
      is-prerelease: ${{ steps.check.outputs.is-prerelease }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check release type
        id: check
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Pre-release if tag contains -dev, -alpha, -beta, -rc
          if [[ "$TAG" =~ -(dev|alpha|beta|rc) ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
            echo "🔶 Pre-release detected: $TAG"
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
            echo "🟢 Stable release detected: $TAG"
          fi

  build:
    needs: determine-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: connexio-windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: connexio-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact-name: connexio-macos-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-name: connexio-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.determine-release.outputs.tag }}
          releaseName: "Connexio ${{ needs.determine-release.outputs.tag }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: ${{ needs.determine-release.outputs.is-prerelease }}
          args: --target ${{ matrix.target }}

  publish-release:
    needs: [determine-release, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${{ needs.determine-release.outputs.tag }}
          VERSION=${{ needs.determine-release.outputs.version }}
          IS_PRE=${{ needs.determine-release.outputs.is-prerelease }}

          # Get previous tag (skip current)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating changelog from $PREV_TAG to $TAG"

          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            if [[ "$line" == feat:* ]] || [[ "$line" == feat\(*\):* ]]; then
              FEATURES="$FEATURES\n- ${line#feat: }"
            elif [[ "$line" == fix:* ]] || [[ "$line" == fix\(*\):* ]]; then
              FIXES="$FIXES\n- ${line#fix: }"
            elif [[ "$line" == ci:* ]] || [[ "$line" == chore:* ]] || [[ "$line" == release:* ]]; then
              :
            else
              OTHER="$OTHER\n- $line"
            fi
          done <<< "$(git log $PREV_TAG..$TAG --pretty=format:'%s' --no-merges)"

          NOTES=""

          # Add pre-release badge if applicable
          if [ "$IS_PRE" = "true" ]; then
            NOTES="⚠️ **This is a pre-release build for testing purposes.**\n"
            NOTES="$NOTES> Not recommended for general use. Please report issues you find.\n\n"
          fi

          if [ -n "$FEATURES" ]; then
            NOTES="$NOTES## ✨ New Features\n$FEATURES\n\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="$NOTES## 🐛 Bug Fixes\n$FIXES\n\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="$NOTES## 📦 Other Changes\n$OTHER\n\n"
          fi

          NOTES="$NOTES---\n\n"
          NOTES="$NOTES**Full Changelog:** [\`$PREV_TAG...$TAG\`](https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG)\n\n"
          NOTES="$NOTES### 📥 Downloads\n"
          NOTES="$NOTES| Platform | File |\n"
          NOTES="$NOTES|----------|------|\n"
          NOTES="$NOTES| Windows | \`Connexio_${VERSION}_x64-setup.exe\` / \`.msi\` |\n"
          NOTES="$NOTES| macOS (Apple Silicon) | \`Connexio_${VERSION}_aarch64.dmg\` |\n"
          NOTES="$NOTES| macOS (Intel) | \`Connexio_${VERSION}_x64.dmg\` |\n"
          NOTES="$NOTES| Linux | \`Connexio_${VERSION}_amd64.AppImage\` / \`.deb\` |"

          echo -e "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.determine-release.outputs.tag }}
          IS_PRE=${{ needs.determine-release.outputs.is-prerelease }}

          # Set --latest only for stable releases
          LATEST_FLAG=""
          if [ "$IS_PRE" = "false" ]; then
            LATEST_FLAG="--latest"
          fi

          gh release edit "$TAG" \
            --repo ${{ github.repository }} \
            --title "Connexio $TAG" \
            --notes-file release_notes.md \
            $LATEST_FLAG \
            2>/dev/null || echo "Release edit skipped"
