name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        # Tambahkan jika mau build multi-platform:
        # os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connexio-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.blockmap
          retention-days: 30
