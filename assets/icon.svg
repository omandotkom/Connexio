<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Subtle inner glow -->
  <rect x="48" y="48" width="416" height="416" rx="88" ry="88" fill="url(#glow)"/>
  
  <!-- Terminal prompt: > _ -->
  <g transform="translate(100, 160)">
    <!-- Chevron > -->
    <polyline points="0,96 60,48 0,0" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cursor _ (blinking line) -->
    <line x1="100" y1="80" x2="220" y2="80" stroke="#a78bfa" stroke-width="32" stroke-linecap="round"/>
  </g>
  
  <!-- Connection dots (representing "Connexio" = connection) -->
  <g transform="translate(256, 340)">
    <circle cx="-60" cy="0" r="10" fill="#ffffff" opacity="0.6"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.8"/>
    <circle cx="60" cy="0" r="10" fill="#ffffff" opacity="0.6"/>
    <line x1="-50" y1="0" x2="-10" y2="0" stroke="#ffffff" stroke-width="4" opacity="0.4"/>
    <line x1="10" y1="0" x2="50" y2="0" stroke="#ffffff" stroke-width="4" opacity="0.4"/>
  </g>
</svg>
